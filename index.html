<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>СТАВКИ-ХУЯВКИ | ИДУЩИЙ К РЕКЕ</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --bg-black: #050505;
            --card-gray: #121212;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background-color: var(--bg-black);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            text-transform: uppercase;
        }

        .payment-card {
            background: var(--card-gray);
            padding: 1.5rem;
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 3px solid var(--neon-green);
            box-shadow: 0 0 50px rgba(57, 255, 20, 0.2);
        }

        .logo {
            font-size: 2.2rem;
            line-height: 0.9;
            margin-bottom: 15px;
            color: var(--neon-green);
            text-shadow: 0 0 15px var(--neon-green);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            margin-bottom: 1rem;
            background: #000;
            border: 1px solid #333;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .philosophy-text {
            font-family: 'Georgia', serif;
            text-transform: none;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #aaa;
            margin-bottom: 1.2rem;
            font-style: italic;
            text-align: left;
            border-left: 2px solid var(--neon-green);
            padding-left: 12px;
        }

        input {
            width: 100%;
            padding: 18px;
            background: #000;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            font-size: 2rem;
            text-align: center;
            margin-bottom: 1rem;
            outline: none;
        }

        .pay-button {
            background-color: var(--neon-green);
            color: #000;
            border: none;
            padding: 22px;
            font-size: 1.4rem;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .pay-button:active {
            transform: scale(0.96);
            background-color: #fff;
        }

        .footer-note {
            margin-top: 1.5rem;
            font-size: 0.65rem;
            color: #555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="logo">СТАВКИ<br>ХУЯВКИ</div>
    
    <div class="video-wrapper">
        <iframe 
            src="https://www.youtube-nocookie.com/embed/p-4jQOl7eO8" 
            title="Идущий к Реке" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>
    
    <div class="philosophy-text">
        Я в своем познании настолько преисполнился что мне этот мир абсолютно понятен... я здесь ищу только одного — покоя и умиротворения.
    </div>
    
    <input type="number" id="amount" placeholder="СУММА (UAH)" inputmode="decimal">

    <button class="pay-button" onclick="redirectToMono()">
        ОБРЕСТИ ВСЕЕДИНСТВО
    </button>

    <div class="footer-note">
        ПРОЕКТ: ИДУЩИЙ К РЕКЕ<br>
        ПОСТИГАЯ ВЕЧНОЕ
    </div>
</div>

<script>
    function redirectToMono() {
        const amount = document.getElementById('amount').value;
        const MONO_JAR_URL = "https://send.monobank.ua/jar/66g9U4uZMY"; 

        if (!amount || amount < 1) {
            alert("ПРЕИСПОЛНИСЬ И ВВЕДИ СУММУ!");
            return;
        }

        window.location.href = `${MONO_JAR_URL}?a=${amount}`;
    }
</script>

</body>
</html>

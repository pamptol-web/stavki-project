<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SSA UA: ORBITA PRO | V13 HIGH STAKES</title>
    <style>
        :root {
            --neon-green: #32d74b; --neon-blue: #0a84ff; --neon-red: #ff453a; --neon-yellow: #ffd60a;
            --bg-color: #000000; --grid-color: rgba(255, 255, 255, 0.04); --frame-color: rgba(28, 28, 30, 0.85);
            --slot-size: clamp(60px, 16vw, 90px);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; text-transform: uppercase; letter-spacing: 0.3px; }
        body { background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100dvh; overflow: hidden; color: #fff; padding: 5px; }
        body::before { content: " "; position: absolute; inset: 0; background: radial-gradient(circle at 50% -20%, rgba(10, 132, 255, 0.18), transparent 70%); z-index: 1; pointer-events: none; }
        
        .crt-monitor-frame { background: var(--frame-color); backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px); border-radius: 40px; border: 1px solid rgba(255,255,255,0.12); padding: 14px; width: 100%; max-width: 400px; position: relative; z-index: 10; box-shadow: 0 50px 100px rgba(0,0,0,0.8); }
        .terminal-screen { background-color: #08080a; border-radius: 28px; padding: 14px; position: relative; min-height: 520px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        
        #status-toast { position: absolute; top: 15px; left: 50%; transform: translate(-50%, -200%) scale(0.5); padding: 12px 24px; border-radius: 40px; background: rgba(20, 20, 22, 0.98); border: 1px solid var(--neon-blue); z-index: 9999; opacity: 0; font-weight: 800; text-align: center; width: 85%; transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1); pointer-events: none; }
        .toast-show { transform: translate(-50%, 0) scale(1) !important; opacity: 1 !important; }

        .slot-machine { background: rgba(255,255,255,0.03); border-radius: 24px; padding: 6px; border: 1px solid var(--glass-border); }
        .reel-container { display: flex; height: var(--slot-size); overflow: hidden; background: rgba(0,0,0,0.7); border-radius: 18px; }
        .reel { width: 25%; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .reel.spinning { animation: reelSpin 0.08s linear infinite; filter: blur(6px); }
        .reel.stop-thud { animation: reelBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes reelBounce { 0% { transform: translateY(-20px); } 100% { transform: translateY(0); } }
        @keyframes reelSpin { 0% { transform: translateY(0); } 100% { transform: translateY(calc(-1 * var(--slot-size))); } }

        .slot { height: var(--slot-size); min-height: var(--slot-size); display: flex; align-items: center; justify-content: center; font-size: 3.2rem; }
        .btn-glass { border-radius: 14px; padding: 10px 0; font-size: 0.85rem; border: 1px solid var(--glass-border); background: var(--glass-bg); color: rgba(255,255,255,0.6); font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-glass.active { background: #fff; color: #000; border-color: #fff; }
        
        .main-btn { width: 100%; border-radius: 22px; padding: 18px 5px; cursor: pointer; border: none; font-weight: 900; background: linear-gradient(180deg, #ffd60a 0%, #ff9f0a 100%); color: #111; margin-top: 10px; font-size: 1rem; box-shadow: 0 10px 20px rgba(255, 159, 10, 0.3); }
        .state-start { background: linear-gradient(180deg, #ff5147 0%, #ff3b30 100%); color: #fff; box-shadow: 0 10px 20px rgba(255, 59, 48, 0.3); }

        .panic-btn-styled { width: 100%; margin-top: 12px; padding: 10px; border-radius: 12px; background: rgba(255, 69, 58, 0.1); border: 1px solid rgba(255, 69, 58, 0.4); color: var(--neon-red); font-size: 0.7rem; font-weight: 800; cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s; }
        .panic-btn-styled:active { background: var(--neon-red); color: #fff; }

        #deposit { background:transparent; border:none; color:#fff; font-size:2.5rem; text-align:center; width:100%; font-weight:900; margin: 10px 0; }
        .hidden { display: none !important; }
        .qr-wrapper { background: #fff; padding: 12px; border-radius: 20px; display: inline-block; margin: 15px 0; }
        .mute-btn { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="crt-monitor-frame">
    <div class="terminal-screen">
        <div id="status-toast"></div>
        <div id="game-ui">
            <div style="display:flex; justify-content:space-between; align-items:center; height:100px; padding: 0 10px;">
                <div style="width:44px;"></div>
                <div style="text-align:center;">
                    <span style="color:rgba(255,255,255,0.3); font-size:0.7rem; font-weight:800; letter-spacing: 2px;">STRATEGIC JACKPOT</span>
                    <div id="jackpot-val" style="font-size:3rem; font-weight:900; color:var(--neon-yellow); line-height:1;">1000</div>
                </div>
                <div class="btn-glass mute-btn" id="muteToggle" onclick="toggleSound()">🔊</div>
            </div>
            
            <div class="slot-machine"><div class="reel-container"><div class="reel" id="reel1"><div class="slot">❓</div></div><div class="reel" id="reel2"><div class="slot">❓</div></div><div class="reel" id="reel3"><div class="slot">❓</div></div><div class="reel" id="reel4"><div class="slot">❓</div></div></div></div>

            <div class="control-panel" style="margin-top:20px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:10px;">
                    <button class="btn-glass" id="turboBtn" onclick="isTurbo=!isTurbo; playClick(); this.classList.toggle('active')">TURBO MODE</button>
                    <button class="btn-glass" id="autoBtn" onclick="isAuto=!isAuto; playClick(); this.classList.toggle('active'); if(isAuto) handleSpin()">AUTO SPIN</button>
                </div>
                <div id="betRow" style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px;"></div>
                <button class="main-btn state-start" id="mainBtn" onclick="handleMainAction()">SSA UA: ORBITA PRO</button>
            </div>

            <div style="background:var(--glass-bg); border-radius:24px; padding:16px; margin-top:15px; text-align:center; border: 1px solid var(--glass-border);">
                <div id="input-zone"><input type="number" id="deposit" placeholder="0000" inputmode="numeric"></div>
                <div id="balance-zone" class="hidden">
                    <div id="amount-text" style="font-size:1.8rem; font-weight:900;">0 UAH</div>
                    <button id="panicBtn" class="panic-btn-styled" onclick="showFinal()">ЕКСТРЕНИЙ ДОНАТ</button>
                </div>
            </div>
        </div>

        <div id="final-screen" class="hidden" style="text-align:center; padding: 25px;">
            <h2 style="font-size:1.6rem;">СИМУЛЯЦІЮ ЗАВЕРШЕНО</h2>
            <div id="final-amount" style="font-size:3rem; color:var(--neon-yellow); font-weight:900; margin:15px 0;">0 UAH</div>
            <div class="qr-wrapper"><img id="qr-img" src="" width="160" height="160"></div>
            <button class="main-btn" onclick="window.open('https://send.monobank.ua/jar/66g9U4uZMY')" style="background:var(--neon-green); color:#fff;">ПЕРЕКАЗАТИ НА БАНКУ</button>
            <button class="main-btn" onclick="location.reload()" style="background:rgba(255,255,255,0.1); color:#fff; font-size:0.8rem; margin-top:12px;">НОВИЙ ЦИКЛ</button>
        </div>
    </div>
</div>

<script>
    let balance = 0, currentBet = 0, isSpinning = false, isTurbo = false, isAuto = false, jackpot = 1000, initialDep = 0, staticBets = [], isMuted = false;
    let audioCtx = null;

    const emojis = ['🚀', '🚜', '🛰️', '☕', '🗑️', '👑', '🍉', '🔥', '🔱'];
    const winConfig = { 
        '🚀': { label: 'ЗАПУСК НЕПТУНА', mult: 2.5 }, '🚜': { label: 'ТРАКТОРНІ ВІЙСЬКА', mult: 2.5 },
        '🛰️': { label: 'СУПУТНИК ICEYE', mult: 4 }, '☕': { label: 'КАВА В ЯЛТІ', mult: 2 },
        '🗑️': { label: 'ЧОРНИЙ ПАКЕТ', mult: 2 }, '🔥': { label: 'БАВОВНА!', mult: 5 },
        '🍉': { label: 'БАЗА: ХЕРСОН', mult: 3 }, '🔱': { label: 'ВОЛЯ: WILD x2', mult: 2 }, '👑': { label: 'JACKPOT!', mult: 0 }
    };

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playTone(freq, type, vol, dur) {
        if (!audioCtx || isMuted) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }
    function playClick() { playTone(800, 'square', 0.05, 0.05); }
    function toggleSound() { isMuted = !isMuted; document.getElementById('muteToggle').innerText = isMuted ? '🔇' : '🔊'; playClick(); }

    function handleMainAction() {
        initAudio(); playClick();
        if (balance === 0) {
            const input = document.getElementById('deposit'); const val = parseInt(input.value);
            if (isNaN(val) || val <= 0) { showToast("ВВЕДІТЬ СУМУ!", "#ff453a"); input.focus(); return; }
            initialDep = balance = val;
            staticBets = [5, 10, 25, 50].map(p => Math.floor(initialDep * (p/100)) || 1);
            currentBet = staticBets[0];
            document.getElementById('input-zone').classList.add('hidden');
            document.getElementById('balance-zone').classList.remove('hidden');
            document.getElementById('mainBtn').className = "main-btn";
            document.getElementById('mainBtn').innerText = "ГЕНЕРУВАТИ SPIN";
            updateUI(); createBetButtons();
        } else { handleSpin(); }
    }

    function createBetButtons() {
        const row = document.getElementById('betRow'); row.innerHTML = '';
        staticBets.forEach(val => {
            const btn = document.createElement('button'); btn.className = 'btn-glass' + (val === currentBet ? ' active' : '');
            btn.innerText = val; btn.onclick = () => { playClick(); if(!isSpinning) { currentBet = val; createBetButtons(); } };
            row.appendChild(btn);
        });
    }

    function handleSpin() {
        if (isSpinning || balance <= 0) return;
        initAudio();
        let actualBet = balance < currentBet ? balance : currentBet;
        isSpinning = true; balance -= actualBet; 
        jackpot += actualBet * 0.1; // LIVE JACKPOT 10%
        updateUI();
        
        playTone(150, 'sawtooth', 0.1, 0.5);
        document.querySelectorAll('.reel').forEach(r => { r.classList.remove('stop-thud'); r.classList.add('spinning'); });
        
        const res = Array.from({length:4}, () => emojis[Math.floor(Math.random() * (emojis.length - 1))]);
        const rng = Math.random();
        if(rng < 0.12) res.fill(emojis[Math.floor(Math.random() * 8)]);
        if(rng < 0.02) res.fill('🔱');

        setTimeout(() => {
            document.querySelectorAll('.reel').forEach((r, i) => {
                setTimeout(() => {
                    r.classList.remove('spinning'); r.classList.add('stop-thud');
                    r.querySelector('.slot').innerText = res[i];
                    playTone(100 - i*10, 'sine', 0.2, 0.2);
                    if (i === 3) finishSpin(res, actualBet);
                }, i * (isTurbo ? 50 : 180));
            });
        }, isTurbo ? 200 : 700);
    }

    function finishSpin(res, betUsed) {
        isSpinning = false;
        
        const secretKeys = ['🍉', '🚜', '🚀', '🛰️'];
        if (secretKeys.every(k => res.includes(k))) { 
            jackpot += 500; 
            showToast("РЕЖИМ ВОЛЯ: +500 ДО JP!", "#0a84ff"); 
        }

        if (res.every(v => v === res[0]) || res.includes('🔱')) {
            let win = 0; const symbol = res[0];
            if (symbol === '👑' && res.every(v => v === '👑')) {
                win = Math.floor(jackpot); jackpot = 1000;
                playTone(880, 'square', 0.1, 1); showToast("JACKPOT СОРВАНО!", "#ffd60a");
            } else {
                const cfg = winConfig[symbol] || {mult: 1.5, label: 'ВИГРАШ'};
                let finalMult = cfg.mult;
                win = Math.floor(betUsed * finalMult); 
                if (res.includes('🔱')) { win *= 2; finalMult *= 2; }
                playTone(440, 'triangle', 0.1, 0.5); 
                showToast(`${cfg.label} x${finalMult}!`, "#32d74b");
            }
            balance += win; updateUI();
        }
        
        if (balance <= 0) showFinal();
        else if (isAuto) setTimeout(handleSpin, 1100);
    }

    function updateUI() { 
        document.getElementById('amount-text').innerText = `${balance} UAH`; 
        document.getElementById('jackpot-val').innerText = Math.floor(jackpot); 
    }

    function showToast(txt, color) { 
        const t = document.getElementById('status-toast'); 
        t.classList.remove('toast-show');
        void t.offsetWidth;
        t.innerText = txt; t.style.borderColor = color; 
        t.classList.add('toast-show'); 
        setTimeout(() => { t.classList.remove('toast-show'); }, 2000); // 2 СЕКУНДИ
    }

    function showFinal() {
        isAuto = false; playTone(200, 'sawtooth', 0.1, 0.8);
        document.getElementById('game-ui').classList.add('hidden');
        document.getElementById('final-screen').classList.remove('hidden');
        document.getElementById('final-amount').innerText = `${initialDep} UAH`;
        document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent('https://send.monobank.ua/jar/66g9U4uZMY')}`;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>СТАВКИ-ХУЯВКИ | ИДУЩИЙ К РЕКЕ</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --danger-red: #ff0000;
            --bg-black: #050505;
            --card-gray: #121212;
            --disabled-gray: #444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background-color: var(--bg-black);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            text-transform: uppercase;
        }

        .payment-card {
            background: var(--card-gray);
            padding: 1.5rem;
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 3px solid var(--neon-green);
            box-shadow: 0 0 50px rgba(57, 255, 20, 0.2);
        }

        .logo {
            font-size: 2.2rem;
            line-height: 0.9;
            margin-bottom: 15px;
            color: var(--neon-green);
            text-shadow: 0 0 15px var(--neon-green);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            margin-bottom: 1rem;
            background: #000;
            border: 1px solid #333;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .slot-machine {
            background: #000;
            border: 2px solid #333;
            padding: 15px;
            margin-bottom: 1rem;
            border-radius: 10px;
        }

        .slots {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 3rem;
            margin-bottom: 15px;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            height: 85px;
            align-items: center;
            border: 1px solid #333;
        }

        .slot { width: 60px; }

        /* КРАСНАЯ КНОПКА КРУТИТЬ */
        .spin-button {
            background-color: var(--danger-red);
            color: #fff;
            border: 3px solid #fff;
            padding: 18px;
            cursor: pointer;
            font-size: 1.3rem;
            font-weight: 900;
            width: 100%;
            transition: all 0.2s;
            font-family: 'Impact', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        .spin-button:hover {
            background-color: var(--neon-green);
            color: #000;
            border-color: #000;
            box-shadow: 0 0 25px var(--neon-green);
        }

        .spin-button:active {
            transform: scale(0.95);
        }

        .bet-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
            opacity: 0.3;
            pointer-events: none;
            transition: 0.5s;
        }

        .bet-btn {
            background: #222;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px;
            font-size: 1rem;
            font-family: 'Impact', sans-serif;
            cursor: pointer;
        }

        .amount-display {
            background: #000;
            border: 2px solid var(--neon-green);
            margin-bottom: 1rem;
            padding: 10px;
            opacity: 0.3;
        }

        #amount-text {
            color: var(--neon-green);
            font-size: 3rem;
            margin: 0;
            display: block;
        }

        .pay-button {
            background-color: var(--disabled-gray);
            color: #222;
            border: none;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: not-allowed;
            width: 100%;
            transition: all 0.5s;
        }

        .pay-button.active {
            background-color: var(--neon-green);
            color: #000;
            cursor: pointer;
            box-shadow: 0 0 30px var(--neon-green);
        }

        .philosophy-quote {
            font-family: 'Georgia', serif;
            text-transform: none;
            font-size: 0.8rem;
            color: #555;
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="logo">СТАВКИ<br>ХУЯВКИ</div>

    <div class="video-wrapper">
        <iframe src="https://www.youtube-nocookie.com/embed/p-4jQOl7eO8" frameborder="0" allowfullscreen></iframe>
    </div>

    <div class="slot-machine">
        <div class="slots" id="slots">
            <div class="slot">🎰</div>
            <div class="slot">🎰</div>
            <div class="slot">🎰</div>
        </div>
        <button class="spin-button" id="spinBtn" onclick="spin()">КРУТАНУТЬ (+10 UAH)</button>
    </div>
    
    <div class="bet-controls" id="betControls">
        <button class="bet-btn" onclick="addAmount(100)">+100 UAH</button>
        <button class="bet-btn" onclick="addAmount(500)">+500 UAH</button>
    </div>

    <div class="amount-display" id="amountBox">
        <span id="amount-text">0</span>
        <small style="color: #444;">СУММА К ЗАЧИСЛЕНИЮ</small>
    </div>

    <button class="pay-button" id="payBtn" onclick="redirectToMono()">
        СНАЧАЛА КРУТИ
    </button>

    <div class="philosophy-quote">
        «Ступай, иди к реке...»
    </div>
</div>

<script>
    const symbols = ['🍋', '🍒', '💎', '7️⃣', '🍀', '🍎'];
    let currentAmount = 0;
    let isSpinning = false;

    function updateDisplay() {
        document.getElementById('amount-text').innerText = currentAmount;
    }

    function addAmount(val) {
        currentAmount += val;
        updateDisplay();
    }

    function spin() {
        if (isSpinning) return;
        addAmount(10);
        isSpinning = true;
        
        const slotElements = document.querySelectorAll('.slot');
        const payBtn = document.getElementById('payBtn');
        const amountBox = document.getElementById('amountBox');
        const betControls = document.getElementById('betControls');
        
        let counter = 0;
        const interval = setInterval(() => {
            slotElements.forEach(el => {
                el.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            });
            counter++;
            
            if (counter > 15) {
                clearInterval(interval);
                isSpinning = false;
                
                amountBox.style.opacity = "1";
                betControls.style.opacity = "1";
                betControls.style.pointerEvents = "auto";
                payBtn.classList.add('active');
                payBtn.innerText = "ОБРЕСТИ ВСЕЕДИНСТВО";

                // ШАНС 0.01% (1 из 10 000)
                const winChance = Math.floor(Math.random() * 10000) + 1;
                
                if (winChance === 7777) {
                    const winSym = symbols[Math.floor(Math.random() * symbols.length)];
                    slotElements.forEach(el => el.innerText = winSym);
                    alert("БОЖЕСТВЕННОЕ ПРЕИСПОЛНЕНИЕ! ДЖЕКПОТ 0.01%! +5000 UAH");
                    addAmount(5000);
                } else {
                    // Анти-выигрыш: если рандом случайно показал 3 одинаковых, меняем один
                    if (slotElements[0].innerText === slotElements[1].innerText && 
                        slotElements[1].innerText === slotElements[2].innerText) {
                        const alt = symbols.filter(s => s !== slotElements[0].innerText);
                        slotElements[2].innerText = alt[Math.floor(Math.random() * alt.length)];
                    }
                }
            }
        }, 80);
    }

    function redirectToMono() {
        const payBtn = document.getElementById('payBtn');
        if (!payBtn.classList.contains('active')) return;
        const MONO_JAR_URL = "https://send.monobank.ua/jar/66g9U4uZMY"; 
        window.location.href = `${MONO_JAR_URL}?a=${currentAmount}`;
    }
</script>

</body>
</html>

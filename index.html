<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMBER ARC 120 | НЕ ПРОЕБИ БАБЛО</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --danger-red: #ff0000;
            --bg-black: #050505;
            --card-gray: #121212;
            --slot-size: clamp(80px, 20vw, 130px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background-color: var(--bg-black);
            background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            text-transform: uppercase;
            overflow-x: hidden;
        }

        .payment-card {
            background: var(--card-gray);
            padding: 2.5rem 1rem;
            width: 100%;
            max-width: 600px;
            text-align: center;
            border: 4px solid var(--neon-green);
            box-shadow: 0 0 100px rgba(57, 255, 20, 0.15);
            position: relative;
        }

        .logo {
            font-size: clamp(1.4rem, 6vw, 2.8rem);
            line-height: 1.1;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        .strike-diagonal {
            position: relative;
            display: inline-block;
            color: rgba(255, 255, 255, 0.8);
        }

        .strike-diagonal::before {
            content: "";
            position: absolute;
            left: -10%;
            top: 45%;
            width: 120%;
            height: 6px;
            background-color: var(--danger-red);
            transform: rotate(-15deg);
            box-shadow: 0 0 15px var(--danger-red);
            border-radius: 2px;
            z-index: 1;
        }

        #dynamic-header {
            display: block;
            color: var(--neon-green);
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            margin-top: 15px;
            text-shadow: 0 0 10px var(--neon-green);
            min-height: 1.5em;
            letter-spacing: 1px;
            font-family: 'Arial', sans-serif;
        }

        .slot-machine {
            background: #cc0000;
            border: 6px solid #fff;
            margin-bottom: 2rem;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            padding: 6px;
        }

        .reel-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: var(--slot-size);
            width: 100%;
            background: #fff;
            border-radius: 8px;
        }

        .reel {
            display: flex;
            flex-direction: column;
            width: var(--slot-size);
            position: relative;
            background: #fff;
        }

        .slot {
            height: var(--slot-size);
            width: var(--slot-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--slot-size) * 0.65);
        }

        .spin-fast { animation: scroll 0.12s linear infinite; }
        .spin-medium { animation: scroll 0.22s linear infinite; }
        .spin-slow { animation: scroll 0.32s linear infinite; }
        .spin-v-slow { animation: scroll 0.42s linear infinite; }

        @keyframes scroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(calc(var(--slot-size) * -5)); }
        }

        .spin-button {
            background: var(--danger-red);
            color: #fff;
            border: 3px solid #fff;
            padding: 20px;
            cursor: pointer;
            font-size: 1.6rem;
            width: 100%;
            font-family: 'Impact';
            box-shadow: 0 5px 20px rgba(255,0,0,0.4);
            margin-bottom: 20px;
        }
        
        .amount-display {
            background: #000;
            border: 2px solid var(--neon-green);
            padding: 15px;
            margin-bottom: 1.5rem;
        }

        #amount-text { color: var(--neon-green); font-size: 4rem; line-height: 1; }

        .pay-button {
            background: #333;
            padding: 22px;
            font-size: 1.6rem;
            width: 100%;
            font-family: 'Impact';
            color: #000;
            border: none;
        }

        .pay-button.active {
            background: var(--neon-green);
            cursor: pointer;
            box-shadow: 0 0 50px var(--neon-green);
        }
    </style>
</head>
<body>

<div id="music-container"></div>

<div class="payment-card">
    <div class="logo">
        <span class="strike-diagonal">НЕ</span> ПРОЕБИ БАБЛО
        <span id="dynamic-header">АТТРАКЦИОН ЩЕДРОСТИ</span>
    </div>

    <div class="slot-machine">
        <div class="reel-container">
            <div class="reel" id="reel1"></div>
            <div class="reel" id="reel2"></div>
            <div class="reel" id="reel3"></div>
            <div class="reel" id="reel4"></div>
        </div>
    </div>

    <button class="spin-button" id="spinBtn" onclick="spin()">КРУТАНУТЬ (+10 UAH)</button>
    
    <div class="amount-display">
        <span id="amount-text">0</span>
        <div style="font-size: 0.8rem; color: #555;">СУММА К ОБНУЛЕНИЮ (UAH)</div>
    </div>

    <button class="pay-button" id="payBtn" onclick="redirectToMono()">СНАЧАЛА КРУТИ</button>
</div>

<script>
    const emojis = ['7️⃣', '💎', '🍉', '🍒', '🍋', '🍇', '🔥', '👑', '🍀', '💰'];
    const speeds = ['spin-fast', 'spin-medium', 'spin-slow', 'spin-v-slow'];
    
    const variations = [
        "АТТРАКЦИОН ЩЕДРОСТИ", "ОБНУЛЕНИЕ КАРМЫ", "СЖИГАТЕЛЬ СУЕТЫ", "УТИЛИЗАЦИЯ БАБЛА", "ИНВЕСТИЦИЯ В ПУСТОТУ",
        "ДОНАТ В БЕСКОНЕЧНОСТЬ", "АТТРАКЦИОН СМИРЕНИЯ", "БЕЗВОЗВРАТНЫЙ ПОТОК", "РИТУАЛЬНЫЙ СЛИВ", "ТВОЙ ВКЛАД В НИКУДА",
        "ОТКУП ОТ ЭГО", "ПОЖЕРТВОВАНИЕ ХАОСУ", "СМЕРТЬ ТВОИХ ДЕНЕГ", "ЭНТРОПИЯ ГРИВНЫ", "ФИНАНСОВАЯ НИРВАНА",
        "ОЧИЩЕНИЕ КОШЕЛЬКА", "ПРОТОКОЛ ЩЕДРОСТИ", "БЕЗУСЛОВНЫЙ ПЛАТЕЖ", "ЭКСПЕРИМЕНТ ПОЗНАНИЯ", "ГОРЕНИЕ СРЕДСТВ",
        "ТРАНЗАКЦИЯ В ЭФИР", "БЕЗДОННАЯ БАНКА", "ГЕОМЕТРИЯ ПРОИГРЫША", "КОРМЛЕНИЕ СИНГУЛЯРНОСТИ", "ПОТОК СМИРЕНИЯ",
        "ДЕМОНТАЖ БОГАТСТВА", "ЦИФРОВОЙ ЖЕРТВЕННИК", "КРУГОВОРОТ ТЩЕТЫ", "ФИЛАНТРОПИЯ БЕЗУМИЯ", "МЕХАНИКА ОБНУЛЕНИЯ",
        "ПРЫЖОК В БЕЗДНУ", "КУРС НА ЗЕРО", "ВАЛЮТНЫЙ ПЕРФОРМАНС", "МАГИЯ ТРАНЗАКЦИЙ", "ФИНАНСОВЫЙ ЭКЗОРЦИЗМ",
        "ПРОЩАНИЕ С КЭШЕМ", "ИСКУССТВО ТРАТИТЬ", "ПИР ВО ВРЕМЯ ЦИФРЫ", "ДЕНЬГИ НА ВЕТЕР (БУКВАЛЬНО)", "ГЕНЕРАТОР УБЫТКОВ",
        "БЕЗЛИМИТНОЕ НИЧТО", "АЛХИМИЯ МИНУСА", "ЭСТЕТИКА ПУСТЫХ КАРМАНОВ", "ВЕЛИКИЙ ПЕРЕНОС", "ПОРТАЛ В МОНОБАНК",
        "ТВОЙ ЛИЧНЫЙ ДЕФОЛТ", "ПАРАДОКС ПРИБЫЛИ", "СКАЧОК В НЕИЗВЕСТНОСТЬ", "ТОРЖЕСТВО ЩЕДРОСТИ", "ФИНАЛЬНЫЙ АККОРД"
    ];

    let currentAmount = 0;
    let isSpinning = false;
    let musicStarted = false;

    function initReels() {
        document.querySelectorAll('.reel').forEach(reel => {
            reel.innerHTML = '';
            for (let i = 0; i < 15; i++) {
                const div = document.createElement('div');
                div.className = 'slot';
                div.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                reel.appendChild(div);
            }
        });
    }

    function startMusic() {
        if (musicStarted) return;
        // Создаем iframe YouTube с автоплеем после клика
        const container = document.getElementById('music-container');
        container.innerHTML = `<iframe width="0" height="0" src="https://www.youtube.com/embed/IDsCtDRV2uM?autoplay=1&loop=1&playlist=IDsCtDRV2uM" frameborder="0" allow="autoplay"></iframe>`;
        musicStarted = true;
    }

    function spin() {
        if (isSpinning) return;
        
        // Пытаемся запустить музыку при клике
        startMusic();

        isSpinning = true;
        const header = document.getElementById('dynamic-header');
        const reels = document.querySelectorAll('.reel');

        header.innerText = variations[Math.floor(Math.random() * variations.length)];
        currentAmount += 10;
        document.getElementById('amount-text').innerText = currentAmount;

        reels.forEach((reel, i) => reel.classList.add(speeds[i]));

        reels.forEach((reel, i) => {
            setTimeout(() => {
                reel.className = 'reel'; 
                reel.querySelectorAll('.slot')[0].innerText = emojis[Math.floor(Math.random() * emojis.length)];
                
                if (i === 3) {
                    isSpinning = false;
                    const payBtn = document.getElementById('payBtn');
                    payBtn.classList.add('active');
                    payBtn.innerText = "ОТПРАВИТЬ В ЭФИР";
                }
            }, 1200 + (i * 600));
        });
    }

    function redirectToMono() {
        if (!isSpinning && currentAmount > 0) {
            window.location.href = `https://send.monobank.ua/jar/66g9U4uZMY?a=${currentAmount}`;
        }
    }

    initReels();
</script>

</body>
</html>

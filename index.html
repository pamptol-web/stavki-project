<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="ОЧИЩЕНИЕ КАРМЫ 100%">
    <meta property="og:description" content="Space Edition: Ритуал финансового обнуления запущен. Крути слоты, очищай карму.">
    <meta property="og:image" content="https://pamptol-web.github.io/stavki-project/preview.jpg">
    <meta property="og:url" content="https://pamptol-web.github.io/stavki-project/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <title>ОЧИЩЕНИЕ КАРМЫ 100%</title>
    
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00f2ff;
            --danger-red: #ff0000;
            --dark-red: #cc0000;
            --bg-black: #050505;
            --card-gray: #121212;
            --slot-size: clamp(70px, 18vw, 110px); 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background-color: var(--bg-black);
            background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh; 
            width: 100%;
            text-transform: uppercase;
            overflow: hidden;
            padding: 15px;
        }

        .payment-card {
            background: var(--card-gray);
            padding: 1.5rem 1rem;
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 4px solid var(--neon-green);
            box-shadow: 0 0 100px rgba(57, 255, 20, 0.15);
            position: relative;
        }

        .logo { font-size: clamp(1.4rem, 7vw, 2.3rem); margin-bottom: 10px; }
        .strike-diagonal { position: relative; display: inline-block; }
        .strike-diagonal::before {
            content: ""; position: absolute; left: -10%; top: 45%; width: 120%; height: 4px;
            background-color: var(--danger-red); transform: rotate(-15deg); box-shadow: 0 0 15px var(--danger-red);
        }

        #dynamic-header { color: var(--neon-green); font-size: 0.85rem; min-height: 1.5em; margin-bottom: 10px; font-family: Arial; }

        .slot-machine {
            background: var(--dark-red);
            border: 4px solid #fff;
            margin: 1rem 0;
            border-radius: 12px;
            display: flex;
            padding: 6px;
            overflow: hidden;
        }

        .reel-container {
            display: flex;
            height: var(--slot-size);
            width: 100%;
            background: #fff;
            border-radius: 4px;
            overflow: hidden;
        }

        .reel { display: flex; flex-direction: column; width: 100%; position: relative; background: #fff; }
        .reel:not(:last-child) { border-right: 2px solid var(--dark-red); }
        .slot { height: var(--slot-size); display: flex; align-items: center; justify-content: center; font-size: calc(var(--slot-size) * 0.7); flex-shrink: 0; }

        .spin-fast { animation: scroll 0.1s linear infinite; }
        .spin-medium { animation: scroll 0.15s linear infinite; }
        .spin-slow { animation: scroll 0.2s linear infinite; }
        .spin-v-slow { animation: scroll 0.25s linear infinite; }
        @keyframes scroll { 0% { transform: translateY(0); } 100% { transform: translateY(calc(var(--slot-size) * -10)); } }
        .stop-at-center { animation: none !important; transform: translateY(0) !important; }

        .bet-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; }
        .bet-btn { background: #222; border: 2px solid #444; color: #888; padding: 10px 5px; font-family: 'Impact'; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .bet-btn.active { border-color: var(--neon-green); color: var(--neon-green); background: #111; box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.2); }

        .amount-display { background: #000; border: 2px solid var(--neon-green); padding: 10px; margin-bottom: 1rem; position: relative; overflow: hidden; min-height: 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #amount-text { color: var(--neon-green); font-size: 3rem; line-height: 1; position: relative; z-index: 2; transition: all 0.3s ease; }
        
        .progress-fill {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 0%;
            background: rgba(57, 255, 20, 0.35);
            transition: width 0.1s linear;
            z-index: 1;
        }

        input#deposit { width: 90%; background: #222; border: 1px solid #444; color: #fff; padding: 12px; font-family: 'Impact'; text-align: center; margin-bottom: 15px; font-size: 1.2rem; outline: none; }

        .btn { padding: 18px; font-size: 1.4rem; width: 100%; font-family: 'Impact'; border: none; cursor: pointer; text-transform: uppercase; position: relative; overflow: hidden; }
        .spin-btn { background: var(--danger-red); color: #fff; transition: all 0.2s ease; }
        .spin-btn:disabled { background: #333; color: #555; cursor: not-allowed; }

        @keyframes rave {
            0% { background: var(--neon-green); color: #000; box-shadow: 0 0 30px var(--neon-green); }
            33% { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px var(--neon-blue); }
            66% { background: var(--danger-red); color: #fff; box-shadow: 0 0 30px var(--danger-red); }
            100% { background: var(--neon-green); color: #000; box-shadow: 0 0 30px var(--neon-green); }
        }

        .pay-btn-rave { 
            animation: rave 0.6s linear infinite !important; 
            color: #000 !important; 
            font-weight: 500 !important; 
            font-size: clamp(1rem, 4.5vw, 1.4rem) !important;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.3);
            border: 3px solid #fff !important;
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<audio id="bgMusic" loop preload="auto"><source src="./space.mp3" type="audio/mpeg"></audio>
<audio id="winSound" preload="auto"><source src="./win.mp3" type="audio/mpeg"></audio>

<div class="payment-card">
    <div class="logo"><span class="strike-diagonal">НЕ</span> ПРОЕБИ БАБЛО</div>
    <div id="dynamic-header">ВНЕСИ ДЕПОЗИТ ДЛЯ ОЧИЩЕНИЯ</div>

    <div id="setup-step">
        <input type="number" id="deposit" placeholder="СУММА ДОНАТА (UAH)" min="5" step="5">
        <button class="btn spin-btn" onclick="startSession()">ПОДТВЕРДИТЬ И НАЧАТЬ</button>
    </div>

    <div id="game-step" class="hidden">
        <div class="slot-machine">
            <div class="reel-container">
                <div class="reel" id="reel1"></div>
                <div class="reel" id="reel2"></div>
                <div class="reel" id="reel3"></div>
                <div class="reel" id="reel4"></div>
            </div>
        </div>

        <div style="font-size: 0.7rem; color: #777; margin-bottom: 5px;">СТАВКА (UAH):</div>
        <div class="bet-selector">
            <button class="bet-btn" onclick="setBet(5)">5</button>
            <button class="bet-btn active" onclick="setBet(10)">10</button>
            <button class="bet-btn" onclick="setBet(20)">20</button>
            <button class="bet-btn" onclick="setBet(50)">50</button>
        </div>

        <button class="btn spin-btn" id="spinBtn" onclick="spin()">КРУТАНУТЬ</button>
        
        <div class="amount-display">
            <div class="progress-fill" id="pFill"></div>
            <span id="amount-text">0</span>
            <div id="amount-label" style="font-size: 0.7rem; color: #555; position: relative; z-index: 2;">ОСТАТОК КАРМЫ (UAH)</div>
        </div>
    </div>
</div>

<script>
    const emojis = ['7️⃣', '💎', '🍉', '🍒', '🍋', '🍇', '🔥', '👑', '🍀', '💰'];
    const speedClasses = ['spin-fast', 'spin-medium', 'spin-slow', 'spin-v-slow'];
    const variations = [
        "АТТРАКЦИОН ЩЕДРОСТИ", "ОБНУЛЕНИЕ КАРМЫ", "СЖИГАТЕЛЬ СУЕТЫ", "УТИЛИЗАЦИЯ БАБЛА", "ИНВЕСТИЦИЯ В ПУСТОТУ",
        "ДОНАТ В БЕСКОНЕЧНОСТЬ", "АТТРАКЦИОН СМИРЕНИЯ", "БЕЗВОЗВРАТНЫЙ ПОТОК", "РИТУАЛЬНЫЙ СЛИВ", "ТВОЙ ВКЛАД В НИКУДА",
        "ОТКУП ОТ ЭГО", "ПОЖЕРТВОВАНИЕ ХАОСУ", "СМЕРТЬ ТВОИХ ДЕНЕГ", "ЭНТРОПИЯ ГРИВНЫ", "ФИНАНСОВАЯ НИРВАНА",
        "ОЧИЩЕНИЕ КОШЕЛЬКА", "ПРОТОКОЛ ЩЕДРОСТИ", "БЕЗУСЛОВНЫЙ ПЛАТЕЖ", "ЭКСПЕРИМЕНТ ПОЗНАНИЯ", "ГОРЕНИЕ СРЕДСТВ",
        "ТРАНЗАКЦИЯ В ЭФИР", "БЕЗДОННАЯ БАНКА", "ГЕОМЕТРИЯ ПРОИГРЫША", "КОРМЛЕНИЕ СИНГУЛЯРНОСТИ", "ПОТОК СМИРЕНИЯ",
        "ДЕМОНТАЖ БОГАТСТВА", "ЦИФРОВОЙ ЖЕРТВЕННИК", "КРУГОВОРОТ ТЩЕТЫ", "ФИЛАНТРОПИЯ БЕЗУМИЯ", "МЕХАНИКА ОБНУЛЕНИЯ",
        "ПРЫЖОК В БЕЗДНУ", "КУРС НА ЗЕРО", "ВАЛЮТНЫЙ ПЕРФОРМАНС", "МАГИЯ ТРАНЗАКЦИЙ", "ФИНАНСОВЫЙ ЭКЗОРЦИЗМ",
        "ПРОЩАНИЕ С КЭШЕМ", "ИСКУССТВО ТРАТИТЬ", "ПИР ВО ВРЕМЯ ЦИФРЫ", "ДЕНЬГИ НА ВЕТЕР (БУКВАЛЬНО)", "ГЕНЕРАТОР УБЫТКОВ",
        "БЕЗЛИМИТНОЕ НИЧТО", "АЛХИМИЯ МИНУСА", "ЭСТЕТИКА ПУСТЫХ КАРМАНОВ", "ВЕЛИКИЙ ПЕРЕНОС", "ПОРТАЛ В МОНОБАНК",
        "ТВОЙ ЛИЧНЫЙ ДЕФОЛТ", "ПАРАДОКС ПРИБЫЛИ", "СКАЧОК В НЕИЗВЕСТНОСТЬ", "ТОРЖЕСТВО ЩЕДРОСТИ", "ФИНАЛЬНЫЙ АККОРД"
    ];

    let initialDeposit = 0;
    let balance = 0;
    let currentBet = 10;
    let isSpinning = false;
    let musicStarted = false;
    let finalizing = false;
    const audio = document.getElementById('bgMusic');
    const winSound = document.getElementById('winSound');

    function fillReel(reelId) {
        const reel = document.getElementById(reelId);
        reel.innerHTML = '';
        for (let i = 0; i < 15; i++) {
            const div = document.createElement('div');
            div.className = 'slot';
            div.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            reel.appendChild(div);
        }
    }

    function setBet(amount) {
        if (isSpinning || finalizing) return;
        currentBet = amount;
        document.querySelectorAll('.bet-btn').forEach(btn => {
            btn.classList.toggle('active', parseInt(btn.innerText) === amount);
        });
        updateSpinButton();
    }

    function updateSpinButton() {
        const btn = document.getElementById('spinBtn');
        if (balance < 5) {
             btn.innerText = "КАРМА ОЧИЩЕНА";
             btn.className = "btn spin-btn pay-btn-rave";
             btn.disabled = false;
             return;
        }

        if (balance < currentBet) {
            btn.innerText = "МАЛО БАБЛА";
            btn.disabled = true;
        } else {
            btn.innerText = `КРУТАНУТЬ (-${currentBet})`;
            btn.disabled = false;
        }
    }

    function startSession() {
        const input = document.getElementById('deposit');
        const val = parseInt(input.value);
        if (isNaN(val) || val < 5) {
            alert("МИНИМУМ 5 UAH");
            return;
        }

        if (!musicStarted) { 
            audio.volume = 0.5; 
            audio.play().catch(() => {}); 
            musicStarted = true; 
        }

        initialDeposit = val;
        balance = val;
        document.getElementById('amount-text').innerText = balance;
        document.getElementById('setup-step').classList.add('hidden');
        document.getElementById('game-step').classList.remove('hidden');
        updateSpinButton();
        document.querySelectorAll('.reel').forEach(reel => fillReel(reel.id));
    }

    function spin() {
        if (finalizing) return;
        
        if (balance < 5) {
            startFinalProgress();
            return;
        }

        if (isSpinning || balance < currentBet) return;
        
        isSpinning = true;
        balance -= currentBet;
        document.getElementById('amount-text').innerText = balance;
        document.getElementById('dynamic-header').innerText = variations[Math.floor(Math.random() * variations.length)];
        updateSpinButton();

        const reels = document.querySelectorAll('.reel');
        reels.forEach((reel, i) => {
            reel.classList.remove('stop-at-center');
            fillReel(reel.id);
            reel.classList.add(speedClasses[i]);
            
            setTimeout(() => {
                reel.classList.add('stop-at-center');
                reel.classList.remove(speedClasses[i]);
                reel.querySelectorAll('.slot')[0].innerText = emojis[Math.floor(Math.random() * emojis.length)];
                
                if (i === reels.length - 1) {
                    isSpinning = false;
                    updateSpinButton();
                    if (balance < 5) {
                        document.getElementById('dynamic-header').innerText = "ОБНУЛЕНИЕ ЗАВЕРШЕНО";
                    }
                }
            }, 1000 + (i * 600));
        });
    }

    function startFinalProgress() {
        if (finalizing) return;
        finalizing = true;
        
        const btn = document.getElementById('spinBtn');
        const textDisplay = document.getElementById('amount-text');
        const pFill = document.getElementById('pFill');
        const label = document.getElementById('amount-label');
        
        // Звук: громкая победа и тихий фон
        audio.volume = 0.05; 
        winSound.currentTime = 0; 
        winSound.volume = 1.0; 
        winSound.play().catch(() => {});
        
        btn.disabled = true;
        btn.innerText = "РИТУАЛЬНЫЙ ПЕРЕВОД...";
        
        const duration = 3000; 
        const startTime = Date.now();

        function update() {
            const now = Date.now();
            const elapsed = now - startTime;
            const progress = Math.min(elapsed / duration, 1);
            
            const currentShow = Math.floor(progress * initialDeposit);
            textDisplay.innerText = currentShow;
            pFill.style.width = (progress * 100) + "%";

            if (progress < 1) {
                requestAnimationFrame(update);
            } else {
                // ФИНАЛЬНЫЙ МОМЕНТ
                textDisplay.innerText = "ОЧИЩЕНИЕ КАРМЫ 100%";
                textDisplay.style.fontSize = "clamp(1.2rem, 5vw, 2.2rem)";
                label.style.opacity = "0";
                
                setTimeout(redirectToMono, 1200);
            }
        }
        
        requestAnimationFrame(update);
    }

    function redirectToMono() {
        window.location.href = `https://send.monobank.ua/jar/66g9U4uZMY?a=${initialDeposit}`;
    }
</script>
</body>
</html>
